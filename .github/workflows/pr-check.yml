name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  lint-commits:
    name: Lint Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install commitlint
        run: npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Lint commit messages
        run: |
          echo "module.exports = {extends: ['@commitlint/config-conventional']};" > commitlint.config.js
          npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  go-tests:
    name: Go Unit and Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Checkout OCI Go SDK
        run: git clone --depth 1 https://github.com/oracle/oci-go-sdk.git /tmp/oci-go-sdk

      - name: Configure local go.work for CI
        run: |
          go work init .
          go work edit -replace github.com/oracle/oci-go-sdk/v65=/tmp/oci-go-sdk

      - name: Run unit tests
        run: make test-unit

      - name: Run integration tests
        run: make test-integration
